[phases.setup]
nixPkgs = ["nodejs_20", "python3", "python3Packages.pip"]

[phases.install]
cmds = [
  "npm ci --omit=dev",
  "python3 -m pip install playwright pyyaml openpyxl"
]

[phases.build]
cmds = [
  "python3 -m playwright install chromium --with-deps"
]

[start]
cmd = "node --dns-result-order=ipv4first src/app.js"
