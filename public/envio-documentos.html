<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envio de Documentos — Conlicit</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#182A39;--navy-l:#1e3347;--navy-m:#243d52;--cyan:#4CC5D7;--cyan-d:#35a8b8;--white:#fff;--support:#C4DAE9;--danger:#ef4444;--success:#10b981;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}
.page{max-width:640px;margin:0 auto;padding:32px 24px 64px;}
.logo{display:block;height:28px;margin:0 auto 32px;}
.card{background:var(--navy-l);border:1px solid rgba(76,197,215,.15);border-radius:16px;padding:28px;}
.card-header{margin-bottom:24px;}
.card-header h1{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px;}
.card-header p{font-size:14px;color:var(--support);line-height:1.6;}
.progress-bar{height:4px;background:rgba(76,197,215,.15);border-radius:4px;margin-bottom:24px;overflow:hidden;}
.progress-fill{height:100%;background:var(--cyan);border-radius:4px;transition:width .4s;}
.doc-list{display:flex;flex-direction:column;gap:10px;}
.doc-item{background:var(--navy-m);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.doc-item.enviado{border-color:rgba(16,185,129,.3);}
.doc-item.rejeitado{border-color:rgba(239,68,68,.3);}
.doc-icon{width:40px;height:40px;border-radius:8px;background:rgba(76,197,215,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-top:2px;}
.doc-icon.ok{background:rgba(16,185,129,.12);}
.doc-icon.err{background:rgba(239,68,68,.12);}
.doc-info{flex:1;min-width:0;}
.doc-name{font-size:14px;font-weight:600;color:var(--white);}
.doc-status{font-size:12px;margin-top:3px;}
.doc-status.pendente{color:rgba(196,218,233,.5);}
.doc-status.enviado,.doc-status.aprovado{color:var(--success);}
.doc-status.rejeitado{color:var(--danger);}
.doc-obs{font-size:11px;color:rgba(239,68,68,.8);margin-top:4px;background:rgba(239,68,68,.07);padding:4px 8px;border-radius:4px;}
.btn-upload{flex-shrink:0;background:var(--cyan);color:var(--navy);border:none;border-radius:7px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;padding:8px 14px;cursor:pointer;transition:background .2s;white-space:nowrap;margin-top:2px;}
.btn-upload:hover{background:var(--cyan-d);}
.btn-upload:disabled{opacity:.5;cursor:not-allowed;}
.btn-sent{flex-shrink:0;font-size:13px;font-weight:600;margin-top:10px;}
.prog-wrap{margin-top:6px;}
.prog-mini{height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--cyan);width:0%;transition:width .2s;}
.input-file{display:none;}
.state-error{text-align:center;padding:48px 24px;}
.state-error .icon{font-size:48px;margin-bottom:16px;}
.state-error h2{font-size:20px;font-weight:700;margin-bottom:8px;}
.state-error p{font-size:14px;color:var(--support);}
.footer-txt{text-align:center;font-size:12px;color:rgba(196,218,233,.4);margin-top:32px;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ff8080;}
.loading{text-align:center;padding:48px;}
.spinner{width:36px;height:36px;border:3px solid rgba(76,197,215,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

zftx7SPvLP/fmFf67t/7Pe3QAA4HM5P1jUn8vrQ/OE4rH5wf2//tqfP1X7xD/v//XyAKT+n9/cG+YGAAAAAAAAAAA7tKGMytAy7A/lVPq/l9dSev6l/34AAAAARu7/Aa1FVAUKeQf7AAAAAElFTkSuQmCC" alt="Conlicit" class="logo">
  <div id="app"><div class="loading"><div class="spinner"></div><p style="color:var(--support);font-size:14px">Carregando...</p></div></div>
  <p class="footer-txt">Conlicit — Consultoria em Licitações &middot; BH/MG</p>
</div>
<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
const TIPOS = {
  contrato_social:             {label:'Contrato Social / Cart\u00e3o CNPJ',icon:'\ud83d\udcc4'},
  certidao_federal:            {label:'Certid\u00e3o Negativa Federal',icon:'\ud83c\udfe6'},
  certidao_estadual:           {label:'Certid\u00e3o Negativa Estadual',icon:'\ud83c\udfe6'},
  certidao_municipal:          {label:'Certid\u00e3o Negativa Municipal',icon:'\ud83c\udfe6'},
  atestado_capacidade_tecnica: {label:'Atestado de Capacidade T\u00e9cnica',icon:'\ud83d\udccb'},
  balanco_patrimonial:         {label:'Balan\u00e7o Patrimonial',icon:'\ud83d\udcca'},
  rg_socio:                    {label:'RG dos S\u00f3cios',icon:'\ud83e\uddfe'},
  cpf_socio:                   {label:'CPF dos S\u00f3cios',icon:'\ud83e\uddfe'},
  logo_empresa:                {label:'Logo da Empresa (PNG)',icon:'\ud83d\uddbc\ufe0f'},
};
const ST_LABEL = {
  pendente:'Pendente — clique para enviar',
  enviado:'\u2713 Enviado — aguardando aprova\u00e7\u00e3o',
  aprovado:'\u2713 Aprovado',
  rejeitado:'\u2717 Rejeitado — envie novamente',
  vencido:'\u26a0 Vencido'
};

function getToken(){
  const p=new URLSearchParams(window.location.search);
  return p.get('token')||window.location.pathname.split('/').pop()||null;
}

let token=getToken(), clienteNome='', docs=[];

async function init(){
  if(!token){renderError('Link inv\u00e1lido','Este link de envio de documentos n\u00e3o \u00e9 v\u00e1lido.');return;}
  try{
    const r=await fetch(API+'/documentos-cliente/upload/'+token);
    const d=await r.json();
    if(!r.ok){
      if(r.status===410) renderError('Link expirado','Este link j\u00e1 expirou. Solicite um novo link \u00e0 equipe Conlicit.');
      else renderError('Link inv\u00e1lido',d.erro||'Link n\u00e3o encontrado.');
      return;
    }
    clienteNome=d.cliente?.nome||'';
    docs=d.documentos||[];
    // Garantir que todos os TIPOS tenham entry
    Object.keys(TIPOS).forEach(k=>{if(!docs.find(x=>x.tipo===k))docs.push({tipo:k,status:'pendente'});});
    render();
  }catch(e){renderError('Erro de conex\u00e3o','N\u00e3o foi poss\u00edvel carregar os dados. Tente novamente.');}
}

function render(){
  const total=docs.length;
  const env=docs.filter(d=>['enviado','aprovado'].includes(d.status)).length;
  const pct=total?Math.round(env/total*100):0;
  document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="card-header">
        <h1>Envio de Documentos</h1>
        <p>Ol\u00e1, <strong>${esc(clienteNome)}</strong>. Envie os documentos abaixo para iniciarmos sua habilita\u00e7\u00e3o.</p>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;color:var(--support)">${env} de ${total} documentos enviados</span>
        <span style="font-size:12px;color:var(--cyan);font-weight:600">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div id="alert-upload" class="alert"></div>
      <div class="doc-list">${docs.map(renderDoc).join('')}</div>
    </div>`;
}

function renderDoc(doc){
  const t=TIPOS[doc.tipo]||{label:doc.tipo,icon:'\ud83d\udcc1'};
  const st=doc.status||'pendente';
  const podeEnviar=['pendente','rejeitado'].includes(st);
  const iOk=['enviado','aprovado'].includes(st);
  return `<div class="doc-item ${st}" id="doc-${doc.tipo}">
    <div class="doc-icon ${iOk?'ok':st==='rejeitado'?'err':''}">${t.icon}</div>
    <div class="doc-info">
      <div class="doc-name">${t.label}</div>
      <div class="doc-status ${st}">${ST_LABEL[st]||st}</div>
      ${doc.observacoes&&st==='rejeitado'?`<div class="doc-obs">Motivo: ${esc(doc.observacoes)}</div>`:''}
      <div id="prog-${doc.tipo}" style="display:none" class="prog-wrap">
        <div class="prog-mini"><div class="prog-fill" id="fill-${doc.tipo}"></div></div>
        <span id="prog-txt-${doc.tipo}" style="font-size:11px;color:var(--support)">Enviando...</span>
      </div>
    </div>
    ${podeEnviar?`<input type="file" class="input-file" id="file-${doc.tipo}" accept=".pdf,.jpg,.jpeg,.png" onchange="uploadDoc('${doc.tipo}',this)"><button class="btn-upload" onclick="document.getElementById('file-${doc.tipo}').click()">Enviar</button>`:`<span class="btn-sent" style="color:${iOk?'var(--success)':'var(--danger)'}">${iOk?'\u2713':'\u21a9'}</span>`}
  </div>`;
}

async function uploadDoc(tipo,input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>10*1024*1024){showAlert('Arquivo muito grande. M\u00e1ximo 10MB.');return;}
  const btn=document.querySelector(`#doc-${tipo} .btn-upload`);
  if(btn)btn.disabled=true;
  document.getElementById(`prog-${tipo}`).style.display='block';
  const fd=new FormData();
  fd.append('tipo',tipo);fd.append('arquivo',file);
  const xhr=new XMLHttpRequest();
  xhr.open('POST',API+'/documentos-cliente/upload/'+token);
  xhr.upload.addEventListener('progress',e=>{
    if(e.lengthComputable){
      const p=Math.round(e.loaded/e.total*100);
      const f=document.getElementById(`fill-${tipo}`);
      const t=document.getElementById(`prog-txt-${tipo}`);
      if(f)f.style.width=p+'%';
      if(t)t.textContent=p+'%';
    }
  });
  xhr.onload=()=>{
    try{const d=JSON.parse(xhr.responseText);
    if(xhr.status===200&&d.sucesso){
      const idx=docs.findIndex(x=>x.tipo===tipo);
      if(idx>=0)docs[idx].status='enviado';
      render();
    }else{showAlert(d.erro||'Erro ao enviar.');if(btn)btn.disabled=false;document.getElementById(`prog-${tipo}`).style.display='none';}
    }catch(e){showAlert('Resposta inesperada do servidor.');}
  };
  xhr.onerror=()=>{showAlert('Falha de conex\u00e3o.');if(btn)btn.disabled=false;};
  xhr.send(fd);
}

function renderError(t,m){document.getElementById('app').innerHTML=`<div class="card"><div class="state-error"><div class="icon">&#x26D4;</div><h2>${t}</h2><p>${m}</p></div></div>`;}
function showAlert(m){const el=document.getElementById('alert-upload');if(!el)return;el.textContent=m;el.style.display='block';setTimeout(()=>{el.style.display='none';},6000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body>
</html>
